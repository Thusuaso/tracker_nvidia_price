name: Fiyat Takip

on:
  schedule:
    # Her 5 dakikada bir. (GitHub cron'u yoğunlukta birkaç dk gecikebilir.)
    - cron: "*/5 * * * *"
  workflow_dispatch: # Elle de tetikleyebilmek için

# state.json / history.csv'yi geri commit edebilmek için yazma izni
permissions:
  contents: write

# Aynı anda tek çalıştırma — çakışmayı önler
concurrency:
  group: fiyat-takip
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Repoyu çek
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # rebase/merge için tam geçmiş lazım

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Bağımlılıkları yükle
        run: pip install -r requirements.txt

      - name: Git kimliği
        run: |
          git config user.name "fiyat-takip-bot"
          git config user.email "bot@users.noreply.github.com"

      - name: En güncel state'i al
        # ÖNEMLİ: tracker'ı çalıştırmadan ÖNCE remote'takini al ki
        # dosyalar sıfırdan oluşup add/add çakışması yaratmasın
        run: |
          git fetch origin main
          git checkout origin/main -- state.json history.csv 2>/dev/null || echo "(henüz yok, sorun değil)"

      - name: Fiyatları kontrol et
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python tracker.py

      - name: Kaydet ve push et
        run: |
          if [[ -z $(git status --porcelain state.json history.csv) ]]; then
            echo "Değişiklik yok, push gerekmiyor"
            exit 0
          fi

          for attempt in 1 2 3; do
            git add state.json history.csv
            git commit -m "fiyat güncellemesi — $(date '+%d.%m.%Y %H:%M') [skip ci]" || true

            if git push origin HEAD:main; then
              echo "✓ Push başarılı (deneme $attempt)"
              exit 0
            fi

            echo "· Push reddedildi, remote ile birleştiriliyor (deneme $attempt)..."
            git fetch origin main
            # Çakışmada bizim sürümü tercih et — state/history kritik veri değil
            git merge -X ours origin/main -m "otomatik birleştirme" || {
              echo "  merge başarısız, remote'a sıfırla ve tekrar dene"
              git checkout --ours state.json history.csv 2>/dev/null || true
              git add state.json history.csv 2>/dev/null || true
              git commit -m "çakışma çözüldü" || true
            }
            sleep $((RANDOM % 5 + 3))
          done

          echo "✗ 3 denemede de push edilemedi"
          exit 1
